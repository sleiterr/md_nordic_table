<!doctype html>
<html lang="da">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon/logo.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Nordic Table</title>
    <!-- SEO: Meta description for search engines -->
    <meta
      name="description"
      content="Nordic Table – Moderne nordisk restaurant med online bordbooking, menu og backoffice administration. Book dit bord nemt online."
    />

    <!-- SEO: Optional keywords -->
    <meta
      name="keywords"
      content="restaurant, nordisk, booking, menu, bordreservation, mad, København, Nordic Table"
    />

    <!-- SEO: Canonical link (replace with your domain) -->
    <link rel="canonical" href="http://localhost:5173" />

    <!-- SEO: Open Graph tags for social media sharing -->
    <meta property="og:title" content="Nordic Table" />
    <meta
      property="og:description"
      content="Book bord på Nordic Table – moderne nordisk restaurant."
    />
    <meta property="og:image" content="/favicon/logo.png" />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="http://localhost:5173" />

    <!-- SEO: Author -->
    <meta name="author" content="Oleg Troian" />
  </head>

    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
